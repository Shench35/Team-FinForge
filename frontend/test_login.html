/**
 * Fetches the list of registered users from the backend.
 * @param {string} token - The JWT token obtained from the /login endpoint.
 */
async function getRegisteredUsers(token) {
  /*const API_URL = 'http://192.168.0.139:3000/users';*/
  
  const API_URL = api+'/users'

  try {
    const response = await fetch(API_URL, {
      method: 'GET',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    });

    if (!response.ok) {
      // Handle cases like 401 (Unauthorized) or 403 (Forbidden)
      const errorData = await response.json();
      throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
    }

    const users = await response.json();
    
    // Process your users list here
    console.log('Successfully fetched users:', users);
    return users;

  } catch (error) {
    console.error('Failed to fetch users:', error.message);
  }
}

async function loginUser(email, password) {
  try {
    const response = await fetch(api+'/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ email, password }),
    });

    const result = await response.json();

    if (response.ok) {
      console.log('Login successful:', result.message);
      // Store the token for future authenticated requests
      localStorage.setItem('finforge_token', result.token);
      return result.user;
    } else {
      console.error('Login failed:', result.message);
    }
  } catch (error) {
    console.error('Error during login:', error);
  }
}

async function registerUser(userData) {
  try {
    const response = await fetch(api+'/register', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(userData),
    });

    const result = await response.json();

    if (response.ok) {
      console.log('Registration successful:', result.message);
      return result.user;
    } else {
      console.error('Registration failed:', result.message);
    }
  } catch (error) {
    console.error('Error during registration:', error);
  }
}
